[mypy]
ignore_missing_imports = True

# JAX compilers use conditional closure patterns that mypy doesn't understand
[mypy-discopt._jax.dag_compiler]
disable_error_code = misc

[mypy-discopt._jax.relaxation_compiler]
disable_error_code = misc

[mypy-discopt._jax.nlp_evaluator]
disable_error_code = misc, no-any-return, assignment

[mypy-discopt.solvers.nlp_ipopt]
disable_error_code = no-any-return
