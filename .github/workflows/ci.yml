name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Clone ripopt (sibling path dependency)
        run: git clone https://${{ secrets.RIPOPT_TOKEN }}@github.com/jkitchin/ripopt.git ../ripopt
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo build -p discopt-core
      - run: cargo test -p discopt-core
      - run: cargo clippy -p discopt-core -- -D warnings

  python-fast:
    name: Python fast (3.12, ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone ripopt (sibling path dependency)
        run: git clone https://${{ secrets.RIPOPT_TOKEN }}@github.com/jkitchin/ripopt.git ../ripopt
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system dependencies (Ipopt)
        run: |
          sudo apt-get update && sudo apt-get install -y coinor-libipopt-dev liblapack-dev libblas-dev gfortran
      - name: Install Python dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin
          pip install jax jaxlib numpy scipy highspy cyipopt pytest pytest-timeout "ruff==0.14.6" mypy
          maturin develop
      - name: Lint
        run: |
          source .venv/bin/activate
          ruff check python/
          ruff format --check python/
      - name: Type check
        run: |
          source .venv/bin/activate
          mypy python/discopt/
      - name: Test (fast — excludes solve and slow tests)
        run: |
          source .venv/bin/activate
          pytest python/tests/ -v --timeout=120 -m "not slow" --ignore=python/tests/test_minlplib.py --ignore=python/tests/test_correctness.py
        env:
          JAX_PLATFORMS: cpu
          JAX_ENABLE_X64: "1"
