name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo build -p discopt-core
      - run: cargo test -p discopt-core
      - run: cargo clippy -p discopt-core -- -D warnings

  python:
    name: Python ${{ matrix.python-version }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install system dependencies (Ipopt)
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y coinor-libipopt-dev liblapack-dev libblas-dev gfortran
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install ipopt
          fi
      - name: Install Python dependencies
        run: |
          pip install maturin
          pip install jax jaxlib numpy scipy highspy cyipopt pytest ruff mypy
          maturin develop
      - name: Lint
        run: ruff check python/
      - name: Type check
        run: mypy python/discopt/ --ignore-missing-imports
      - name: Test
        run: |
          JAX_PLATFORMS=cpu JAX_ENABLE_X64=1 pytest python/tests/ -v --timeout=300
        env:
          JAX_PLATFORMS: cpu
          JAX_ENABLE_X64: "1"
