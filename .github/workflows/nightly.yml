name: Nightly

on:
  schedule:
    - cron: "0 6 * * *" # 6 AM UTC daily
  workflow_dispatch: # manual trigger

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Clone ripopt (sibling path dependency)
        run: git clone https://${{ secrets.RIPOPT_TOKEN }}@github.com/jkitchin/ripopt.git ../ripopt
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo build -p discopt-core
      - run: cargo test -p discopt-core
      - run: cargo clippy -p discopt-core -- -D warnings

  python-full:
    name: Python ${{ matrix.python-version }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Clone ripopt (sibling path dependency)
        run: git clone https://${{ secrets.RIPOPT_TOKEN }}@github.com/jkitchin/ripopt.git ../ripopt
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install system dependencies (Ipopt)
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y coinor-libipopt-dev liblapack-dev libblas-dev gfortran
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install ipopt
          fi
      - name: Install Python dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin
          pip install jax jaxlib numpy scipy highspy cyipopt pytest pytest-timeout "ruff==0.14.6" mypy equinox optax
          maturin develop
      - name: Test (full suite including MINLPLib solves)
        run: |
          source .venv/bin/activate
          pytest python/tests/ -v --timeout=300
        env:
          JAX_PLATFORMS: cpu
          JAX_ENABLE_X64: "1"
