repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.6
    hooks:
      - id: ruff
        args: [--fix]
        exclude: ^discopt_benchmarks/
      - id: ruff-format
        exclude: ^discopt_benchmarks/
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^python/discopt/
        additional_dependencies: [numpy, jax]
        args: [--ignore-missing-imports]
